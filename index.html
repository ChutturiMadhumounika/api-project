<!DOCTYPE html>
<html>
<head>
<title>API Project</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
background: linear-gradient(to right, #e3f2fd, #ffffff);
font-family: Arial;
}

h2 {
font-weight: bold;
}

.search-box {
max-width: 400px;
margin: auto;
}

.card {
border: none;
border-radius: 12px;
transition: 0.3s;
}

.card:hover {
transform: translateY(-5px);
box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">📡 Posts Explorer</h2>

<div class="search-box">
<input id="search" class="form-control shadow-sm" placeholder="🔍 Search posts...">
</div>

<div class="text-center mt-3">
<button onclick="loadData()" class="btn btn-primary px-4">Load Posts</button>
</div>

<div id="data" class="row mt-4"></div>

</div>

<script src="script.js"></script>
</body>
</html>
